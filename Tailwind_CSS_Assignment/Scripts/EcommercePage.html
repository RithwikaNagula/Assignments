<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerce Page</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#fff6f4] font-serif">
<div class="grid grid-cols-[240px_1fr] min-h-screen">

  <!-- Navbar -->
  <aside class="bg-white shadow-lg p-6 sticky top-0 h-screen">
    <h2 class="text-2xl font-bold mb-8">Shop</h2>
    <ul class="space-y-4 text-lg">
      <li><a href="#electronics" class="hover:text-[#ff6a3d]">Electronics</a></li>
      <li><a href="#beauty" class="hover:text-[#ff6a3d]">Beauty</a></li>
      <li><a href="#accessories" class="hover:text-[#ff6a3d]">Accessories</a></li>
      <li><a href="#fashion" class="hover:text-[#ff6a3d]">Fashion</a></li>
      
    </ul>
  </aside>


  <!-- Main Content -->
  <main class="p-10 space-y-24">
    <section id="electronics">
      <h1 class="text-2xl font-bold text-center mb-8">Electronics</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/SmartPhone.jfif" class="w-full h-[180px] object-contain">
          <div class="p-4 text-center">
            <h3>Smartphone</h3>
            <p class="text-[#ff6a3d] font-bold">$699</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/HeadPhones.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Headphones</h3>
            <p class="text-[#ff6a3d] font-bold">$120</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/Smartwatch.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Smart Watch</h3>
            <p class="text-[#ff6a3d] font-bold">$199</p>
          </div>
        </div>
      </div>
    </section>

   
    <section id="beauty">
      <h1 class="text-2xl font-bold text-center mb-8">Beauty</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/Lipstick.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>LipStick</h3>
            <p class="text-[#ff6a3d] font-bold">$699</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/facecream.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Facecream</h3>
            <p class="text-[#ff6a3d] font-bold">$120</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/perfume.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Perfume</h3>
            <p class="text-[#ff6a3d] font-bold">$199</p>
          </div>
        </div>
      </div>
    </section>

   
    <section id="accessories">
      <h1 class="text-2xl font-bold text-center mb-8">Accessoriess</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/handbag.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Handbag</h3>
            <p class="text-[#ff6a3d] font-bold">$699</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/sunglasses.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Sunglasses</h3>
            <p class="text-[#ff6a3d] font-bold">$120</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/Wallet1.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Wallet</h3>
            <p class="text-[#ff6a3d] font-bold">$199</p>
          </div>
        </div>
      </div>
    </section>

   
    <section id="fashion">
      <h1 class="text-2xl font-bold text-center mb-8">Fashion</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/shirt.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Shirt</h3>
            <p class="text-[#ff6a3d] font-bold">$699</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/jeans.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Jeans</h3>
            <p class="text-[#ff6a3d] font-bold">$120</p>
          </div>
        </div>

        <div class="bg-white shadow rounded overflow-hidden">
          <img src="../Images/skirt.jfif" class="w-full h-[200px] object-contain">
          <div class="p-4 text-center">
            <h3>Skirt</h3>
            <p class="text-[#ff6a3d] font-bold">$199</p>
          </div>
        </div>
      </div>
      </div>
    </section>   
  </main>
</div>
</body>
</html>
