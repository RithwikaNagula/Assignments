<!-- Register Page -->
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-text-primary">Create Account</h1>
            <p class="text-text-muted mt-2">Register to access the Employee Portal</p>
        </div>

        <!-- Register Card -->
        <div class="bg-card/80 backdrop-blur-xl border border-border/40 rounded-2xl p-8 shadow-2xl shadow-accent/10">
            <form (ngSubmit)="onRegister()" class="space-y-5">
                <!-- Error Message -->
                <div *ngIf="errorMessage"
                    class="bg-danger/10 border border-danger/30 text-danger rounded-xl px-4 py-3 text-sm">
                    {{ errorMessage }}
                </div>

                <!-- Success Message -->
                <div *ngIf="successMessage"
                    class="bg-success/10 border border-success/30 text-success rounded-xl px-4 py-3 text-sm">
                    {{ successMessage }}
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Username</label>
                    <input type="text" [(ngModel)]="username" name="username" placeholder="Choose a username"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all duration-200" />
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Email</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all duration-200" />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Password</label>
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Create a password"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all duration-200" />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Confirm Password</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Confirm your password"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all duration-200" />
                </div>

                <!-- Role Selection -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Select Role</label>
                    <select [(ngModel)]="role" name="role"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all duration-200 appearance-none cursor-pointer">
                        <option value="" disabled class="bg-surface text-text-muted">Choose a role</option>
                        <option *ngFor="let r of roles" [value]="r" class="bg-surface text-text-primary">{{ r }}
                        </option>
                    </select>
                    <!-- Role Cards -->
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <div class="text-center p-3 rounded-lg border transition-all duration-200 cursor-pointer"
                            [ngClass]="role === 'Admin' ? 'border-primary/50 bg-primary/10' : 'border-border/20 bg-surface/30'"
                            (click)="role = 'Admin'">
                            <p class="text-sm font-medium"
                                [ngClass]="role === 'Admin' ? 'text-primary-light' : 'text-text-muted'">Admin</p>
                        </div>
                        <div class="text-center p-3 rounded-lg border transition-all duration-200 cursor-pointer"
                            [ngClass]="role === 'Manager' ? 'border-accent/50 bg-accent/10' : 'border-border/20 bg-surface/30'"
                            (click)="role = 'Manager'">
                            <p class="text-sm font-medium"
                                [ngClass]="role === 'Manager' ? 'text-accent-light' : 'text-text-muted'">Manager</p>
                        </div>
                        <div class="text-center p-3 rounded-lg border transition-all duration-200 cursor-pointer"
                            [ngClass]="role === 'Employee' ? 'border-success/50 bg-success/10' : 'border-border/20 bg-surface/30'"
                            (click)="role = 'Employee'">
                            <p class="text-sm font-medium"
                                [ngClass]="role === 'Employee' ? 'text-success' : 'text-text-muted'">Employee</p>
                        </div>
                    </div>
                </div>

                <!-- Register Button -->
                <button type="submit" [disabled]="isLoading"
                    class="w-full py-3.5 bg-gradient-to-r from-accent to-primary hover:from-accent-light hover:to-primary-light text-white font-semibold rounded-xl shadow-lg shadow-accent/25 hover:shadow-accent/40 transition-all duration-300 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    {{ isLoading ? 'Creating Account...' : 'Create Account' }}
                </button>
            </form>

            <!-- Login Link -->
            <div class="mt-6 text-center">
                <p class="text-text-muted text-sm">Already have an account?
                    <a routerLink="/login"
                        class="text-accent-light hover:text-accent font-medium transition-colors duration-200">Sign
                        In</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-text-muted text-xs mt-6">Employee Management System &copy; 2026</p>
    </div>
</div>
