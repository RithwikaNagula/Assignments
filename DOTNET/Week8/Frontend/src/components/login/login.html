<!-- Login Page -->
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-text-primary">Employee Portal</h1>
            <p class="text-text-muted mt-2">Sign in to access your dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="bg-card/80 backdrop-blur-xl border border-border/40 rounded-2xl p-8 shadow-2xl shadow-primary/10">
            <form (ngSubmit)="onLogin()" class="space-y-5">
                <!-- Error Message -->
                <div *ngIf="errorMessage"
                    class="bg-danger/10 border border-danger/30 text-danger rounded-xl px-4 py-3 text-sm">
                    {{ errorMessage }}
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Username</label>
                    <input type="text" [(ngModel)]="username" name="username" placeholder="Enter your username"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                        autocomplete="username" />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Password</label>
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                        autocomplete="current-password" />
                </div>

                <!-- CAPTCHA -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Security Check</label>
                    <div class="flex items-center gap-3 mb-2">
                        <canvas #captchaCanvas class="rounded-lg border border-border/40"></canvas>
                        <button type="button" (click)="generateCaptcha()"
                            class="px-3 py-2 rounded-xl bg-surface-light/50 border border-border/40 text-text-muted hover:text-primary hover:border-primary/50 transition-all duration-200 text-sm"
                            title="Refresh CAPTCHA">Refresh</button>
                    </div>
                    <input type="text" [(ngModel)]="captchaInput" name="captcha" placeholder="Enter the answer"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" />
                </div>

                <!-- Forgot Password Link -->
                <div class="text-right">
                    <a routerLink="/forgot-password"
                        class="text-sm text-text-muted hover:text-amber-400 transition-colors duration-200">Forgot
                        Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" [disabled]="isLoading"
                    class="w-full py-3.5 bg-gradient-to-r from-primary to-primary-dark hover:from-primary-light hover:to-primary text-white font-semibold rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 transition-all duration-300 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    {{ isLoading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>

            <!-- Register Link -->
            <div class="mt-6 text-center">
                <p class="text-text-muted text-sm">Don't have an account?
                    <a routerLink="/register"
                        class="text-primary-light hover:text-primary font-medium transition-colors duration-200">Register</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-text-muted text-xs mt-6">Employee Management System &copy; 2026</p>
    </div>
</div>
