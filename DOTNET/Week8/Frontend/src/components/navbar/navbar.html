<!-- Navbar - Only shows when user is logged in -->
<nav *ngIf="isLoggedIn" class="bg-surface/90 backdrop-blur-xl border-b border-border/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Brand -->
            <div class="flex items-center gap-3">
                <span class="text-lg font-bold text-text-primary tracking-tight">EMS</span>
            </div>

            <!-- User Info -->
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-3">
                    <div class="text-right">
                        <p class="text-sm font-medium text-text-primary">{{ user?.username }}</p>
                        <p class="text-xs text-text-muted">{{ user?.role }}</p>
                    </div>
                    <div
                        class="w-9 h-9 rounded-full bg-gradient-to-br from-primary-light to-accent flex items-center justify-center text-white text-sm font-bold uppercase">
                        {{ user?.username?.charAt(0) }}
                    </div>
                </div>

                <!-- Role Badge -->
                <span class="px-3 py-1 rounded-full text-xs font-semibold" [ngClass]="{
            'bg-primary/20 text-primary-light border border-primary/30': user?.role === 'Admin',
            'bg-accent/20 text-accent-light border border-accent/30': user?.role === 'Manager',
            'bg-success/20 text-success border border-success/30': user?.role === 'Employee'
          }">
                    {{ user?.role }}
                </span>

                <!-- Logout Button -->
                <button (click)="logout()"
                    class="px-4 py-2 rounded-xl bg-danger/10 border border-danger/30 text-danger hover:bg-danger/20 hover:border-danger/50 transition-all duration-200 text-sm font-medium">
                    Logout
                </button>
            </div>
        </div>
    </div>
</nav>
