<!-- Forgot Password Page -->
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-text-primary">Forgot Password</h1>
            <p class="text-text-muted mt-2">Enter your email and new password to reset your account</p>
        </div>

        <!-- Card -->
        <div class="bg-card/80 backdrop-blur-xl border border-border/40 rounded-2xl p-8 shadow-2xl shadow-amber-500/10">

            <!-- Error Message -->
            <div *ngIf="errorMessage"
                class="bg-danger/10 border border-danger/30 text-danger rounded-xl px-4 py-3 text-sm mb-5">
                {{ errorMessage }}
            </div>

            <!-- Success Message -->
            <div *ngIf="successMessage"
                class="bg-success/10 border border-success/30 text-success rounded-xl px-4 py-3 text-sm mb-5">
                {{ successMessage }}
            </div>

            <!-- Single Step: Reset Password -->
            <form (ngSubmit)="onResetPassword()" class="space-y-5">
                <!-- Email Address -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Email Address</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your registered email"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all duration-200" />
                </div>

                <!-- New Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">New Password</label>
                    <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all duration-200" />
                </div>

                <!-- Confirm New Password -->
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">Confirm New Password</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Confirm new password"
                        class="w-full px-4 py-3 bg-surface/60 border border-border/40 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all duration-200" />
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="isLoading"
                    class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-semibold rounded-xl shadow-lg shadow-amber-500/25 hover:shadow-amber-500/40 transition-all duration-300 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    {{ isLoading ? 'Resetting...' : 'Reset Password' }}
                </button>
            </form>

            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <p class="text-text-muted text-sm">Remember your password?
                    <a routerLink="/login"
                        class="text-amber-400 hover:text-amber-300 font-medium transition-colors duration-200">Sign
                        In</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-text-muted text-xs mt-6">Employee Management System &copy; 2026</p>
    </div>
</div>
