<div class="flex items-center justify-center min-h-[80vh] bg-slate-50 p-4">
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-lg border border-slate-100">
        <h2 class="mb-8 text-3xl font-bold text-center text-slate-800">Login</h2>
        <form (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-600">Username</label>
                <input type="text" [(ngModel)]="username" name="username" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-400 focus:border-sky-400 transition-all outline-none">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-600">Password</label>
                <input type="password" [(ngModel)]="password" name="password" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-400 focus:border-sky-400 transition-all outline-none">
            </div>
            <button type="submit" [disabled]="loading()"
                class="w-full py-3 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white font-bold rounded-lg transition-colors shadow-md hover:shadow-lg">
                Login
            </button>
        </form>
        <p class="mt-8 text-center text-slate-600">
            Don't have an account?
            <a routerLink="/register" class="text-sky-500 hover:text-sky-600 font-semibold no-underline">Register</a>
        </p>
        @if (error()) {
        <div class="mt-4 p-3 bg-red-50 border border-red-100 text-red-500 text-sm text-center rounded-lg">
            {{ error() }}
        </div>
        }
    </div>
</div>
